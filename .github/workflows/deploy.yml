name: Deploy to InfinityFree

on:
  push:
    branches:
      - main  # Change to 'master' if that's your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Create config.php with secrets
      run: |
        cat > php/config.php << 'EOF'
        <?php
        // Database Configuration
        // Automatically detects if running on InfinityFree or localhost

        // Check if running on InfinityFree (by checking server name)
        $is_production = (strpos($_SERVER['HTTP_HOST'], 'infinityfree') !== false || 
                          strpos($_SERVER['HTTP_HOST'], '.rf.gd') !== false ||
                          strpos($_SERVER['HTTP_HOST'], '.42web.io') !== false);

        if ($is_production) {
            // InfinityFree Production Settings
            $host = "${{ secrets.DB_HOST }}";
            $user = "${{ secrets.DB_USER }}";
            $pass = "${{ secrets.DB_PASS }}";
            $dbname = "${{ secrets.DB_NAME }}";
        } else {
            // Local Development Settings
            $host = "localhost";
            $user = "root";
            $pass = "";
            $dbname = "greenlife_wellness";
        }

        $conn = new mysqli($host, $user, $pass, $dbname);

        if ($conn->connect_error) {
            die("Connection failed: " . $conn->connect_error);
        }
        ?>
        EOF
    
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@4.3.3
      with:
        server: ${{ secrets.FTP_HOSTNAME }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: ${{ secrets.FTP_PORT }}
        server-dir: /htdocs/
        exclude: |
          **/.git*
          **/.git*/**
          **/.github/**
          **/node_modules/**
          **/.vscode/**
          **/.vs/**
          **/README.md
          **/RAILWAY_DEPLOYMENT.md
          **/railway.json
          **/railway.toml
          **/nixpacks.toml
